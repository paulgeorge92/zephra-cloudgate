services:
  zephra-cloudgate:
    build: .
    container_name: zephra-cloudgate
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
      DATABASE_URL: ${DATABASE_URL:-file:./data/data.db}
      UPLOADS_DIR: ${UPLOADS_DIR:-./data/uploads}
      JWT_SECRET: ${JWT_SECRET:-change-this-before-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-12345678901234567890123456789012}
    volumes:
      - ./data:/app/data
